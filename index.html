            letter-spacing: 0.08em;
            border: none;

        .login-btn-secondary {

            color: #5b95ff;

            color: #ff6b6b;
            border: 1px solid #ff6b6b;

            border-radius: 10px;

            font-weight: 600;

            flex: 1;

        .page-title {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #ffffff;
        }

        .page-subtitle {
            font-size: 15px;
            color: #a8b1c7;
        }

            color: #ffffff;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;

            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;

            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            background: none;
            border: none;
            color: #a8b1c7;
            font-size: 24px;

            margin-top: 24px;

        .tab-btn {
            background: none;
            border: none;
            color: #a8b1c7;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab-btn.active {
            color: #5b95ff;
            border-bottom-color: #5b95ff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .kpi-strip {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background-color: #161a24;
            border: 1px solid #252b3d;
            border-radius: 16px;
            padding: 18px;
        }

        .kpi-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #a8b1c7;
            margin-bottom: 8px;
            letter-spacing: 0.08em;
        }

        .kpi-value {
            font-size: 30px;
            font-weight: 600;
            font-family: 'Courier New', monospace;
            color: #ffffff;

        .toast {

            right: 24px;
            background-color: #1e2333;
            border: 1px solid #252b3d;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 13px;
            color: #ffffff;
            z-index: 2000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.success {
            border-color: #4ade80;
            color: #4ade80;
        }

        .toast.error {
            border-color: #ff6b6b;

        .text-mono {

        select {

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 12px;

        .checkbox-item {
            display: flex;
            align-items: center;
        }

        .checkbox-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            cursor: pointer;
            accent-color: #5b95ff;
        }

        .checkbox-item label {
            margin: 0;
            font-weight: 400;
            font-size: 14px;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }
    </style>
</head>

                { id: 'P002', nombre: 'One Shot Q2', tipo: 'One Shot', valores: [0, 0, 300000, 300000, 300000, 0, 0, 0, 0, 0, 0, 0], estado: 'Activo' }
            ],
            asignaciones: { '2026': { 'P001': { 'BP001': [80, 80, 80, 80, 80, 80, 80, 80, 80, 80, 80, 80], 'BP002': [40, 40, 40, 40, 40, 40, 40, 40, 40, 40, 40, 40], 'BP003': [40, 40, 40, 40, 40, 40, 40, 40, 40, 40, 40, 40] }, 'P002': { 'BP001': [0, 0, 60, 60, 60, 0, 0, 0, 0, 0, 0, 0], 'BP002': [0, 0, 40, 40, 40, 0, 0, 0, 0, 0, 0, 0] } } },
            categorias: ['Always On', 'One Shot', 'Producción', 'Consultoría', 'Soporte'],
            nextBpId: 4,
            nextProyId: 3
        };

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function mapFirebaseError(code) {
            const errors = {
                'auth/invalid-email': 'Email inválido',
                'auth/user-not-found': 'Usuario no existe',
                'auth/wrong-password': 'Contraseña incorrecta',
                'auth/email-already-in-use': 'Email ya registrado',
                'auth/weak-password': 'Contraseña debe tener al menos 6 caracteres',
                'auth/too-many-requests': 'Demasiados intentos, intenta más tarde'
            };
            return errors[code] || 'Error: ' + code;
        }

        async function signUp(email, password) {
            const userCred = await window.auth.createUserWithEmailAndPassword(email, password);
            await initializeUserData(userCred.user.uid);
            showToast('Cuenta creada exitosamente', 'success');
        }

        async function signIn(email, password) {
            await window.auth.signInWithEmailAndPassword(email, password);
            showToast('Sesión iniciada', 'success');
        }

        async function logout() {
            unsubscribers.forEach(unsub => unsub());
            unsubscribers = [];
            state = {};
            await window.auth.signOut();
            showLoginPage();
        }

        async function initializeUserData(uid) {
            const configRef = window.db.collection('users').doc(uid).collection('config').doc('main');
            const configSnap = await configRef.get();
            if (!configSnap.exists) {
                await configRef.set({ categorias: DEFAULT_STATE.categorias, nextBpId: DEFAULT_STATE.nextBpId, nextProyId: DEFAULT_STATE.nextProyId });
                for (const bp of DEFAULT_STATE.bps) {
                    await window.db.collection('users').doc(uid).collection('bps').doc(bp.id).set(bp);
                }
                for (const proy of DEFAULT_STATE.proyectos) {
                    await window.db.collection('users').doc(uid).collection('proyectos').doc(proy.id).set(proy);
                }
                for (const [proyId, bps] of Object.entries(DEFAULT_STATE.asignaciones[YEAR])) {
                    for (const [bpId, horas] of Object.entries(bps)) {
                        const key = `${proyId}_${bpId}_${YEAR}`;
                        await window.db.collection('users').doc(uid).collection('asignaciones').doc(key).set({ proyId, bpId, year: YEAR, horas });
                    }
                }
            }
        }

        function showLoginPage() {
            document.getElementById('appContainer').classList.add('hidden');
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').textContent = '';
        }

        function showAppPage() {
            console.log('showAppPage() - Mostrando app...');
            console.log('loginContainer:', document.getElementById('loginContainer'));
            console.log('appContainer:', document.getElementById('appContainer'));

            const loginCon = document.getElementById('loginContainer');
            const appCon = document.getElementById('appContainer');

            if (loginCon) {
                loginCon.classList.add('hidden');
                console.log('✓ loginContainer oculto');
            } else {
                console.error('✗ loginContainer NO encontrado');
            }

            if (appCon) {
                appCon.classList.remove('hidden');
                console.log('✓ appContainer mostrado. display:', window.getComputedStyle(appCon).display);
            } else {
                console.error('✗ appContainer NO encontrado');
            }

            const emailDiv = document.getElementById('logoutEmail');
            if (emailDiv && currentUser) {
                emailDiv.textContent = currentUser.email;
                console.log('✓ Email mostrado:', currentUser.email);
            }

            console.log('Llamando a subscribeToUserData...');
            subscribeToUserData(currentUser.uid);

            console.log('Llamando a navigate("dashboard")...');
            navigate('dashboard');

            const dashboard = document.getElementById('dashboard');
            if (dashboard) {
                console.log('✓ dashboard encontrado. display:', window.getComputedStyle(dashboard).display);
            }
        }

        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function navigate(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(page).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.dataset.page === page) link.classList.add('active');
                else link.classList.remove('active');
            });
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 }).format(value);
        }

        // ── Login Handlers ──
        document.getElementById('loginBtnSignIn').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const spinner = '<span class="login-spinner"></span>';

            if (!email || !password) {
                errorDiv.textContent = 'Completa email y contraseña';
                return;
            }

            document.getElementById('loginBtnSignIn').disabled = true;
            document.getElementById('loginBtnSignUp').disabled = true;
            document.getElementById('loginSignInText').innerHTML = spinner + 'Entrando...';

            try {
                await signIn(email, password);
                errorDiv.textContent = '';
            } catch (error) {
                errorDiv.textContent = mapFirebaseError(error.code);
                document.getElementById('loginSignInText').textContent = 'Sign In';
                document.getElementById('loginBtnSignIn').disabled = false;
                document.getElementById('loginBtnSignUp').disabled = false;
            }
        });

        document.getElementById('loginBtnSignUp').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const spinner = '<span class="login-spinner"></span>';

            if (!email || !password) {
                errorDiv.textContent = 'Completa email y contraseña';
                return;
            }

            if (password.length < 6) {
                errorDiv.textContent = 'Contraseña debe tener al menos 6 caracteres';
                return;
            }

            document.getElementById('loginBtnSignIn').disabled = true;
            document.getElementById('loginBtnSignUp').disabled = true;
            document.getElementById('loginSignUpText').innerHTML = spinner + 'Creando...';

            try {
                await signUp(email, password);
                errorDiv.textContent = '';
            } catch (error) {
                errorDiv.textContent = mapFirebaseError(error.code);
                document.getElementById('loginSignUpText').textContent = 'Create Account';
                document.getElementById('loginBtnSignIn').disabled = false;
                document.getElementById('loginBtnSignUp').disabled = false;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            if (confirm('¿Confirmar logout?')) {
                await logout();
            }
        });

        // ── Firestore Listeners ──
        function subscribeToUserData(uid) {
            console.log('📡 subscribeToUserData() - uid:', uid);
            try {
                // BPs
                const unsub1 = window.db.collection('users').doc(uid).collection('bps').onSnapshot(snap => {
                    state.bps = [];
                    snap.forEach(doc => {
                        state.bps.push(doc.data());
                    });
                    console.log('✓ BPs cargados desde Firestore:', state.bps.length, state.bps);
                    setTimeout(() => renderDashboard(), 100);
                }, err => console.error('✗ Error cargando BPs:', err));
                unsubscribers.push(unsub1);

                // Proyectos
                const unsub2 = window.db.collection('users').doc(uid).collection('proyectos').onSnapshot(snap => {
                    state.proyectos = [];
                    snap.forEach(doc => {
                        state.proyectos.push(doc.data());
                    });
                    console.log('✓ Proyectos cargados desde Firestore:', state.proyectos.length, state.proyectos);
                    setTimeout(() => renderDashboard(), 100);
                }, err => console.error('✗ Error cargando Proyectos:', err));
                unsubscribers.push(unsub2);

                // Config
                const unsub3 = window.db.collection('users').doc(uid).collection('config').doc('main').onSnapshot(doc => {
                    if (doc.exists) {
                        state.categorias = doc.data().categorias || [];
                        console.log('✓ Config cargada:', state.categorias);
                    }
                }, err => console.error('✗ Error cargando Config:', err));
                unsubscribers.push(unsub3);

                console.log('✓ Todos los listeners suscriptos');
            } catch (error) {
                console.error('✗ Error en subscribeToUserData:', error);
            }
        }

        // ── Dashboard Render ──
        function renderDashboard() {
            console.log('🔄 renderDashboard() ejecutada');
            console.log('State:', { bps: state.bps?.length, proyectos: state.proyectos?.length });

            const content = document.getElementById('dashBpContent');
            console.log('Elemento dashBpContent:', content);

            if (!content) {
                console.error('✗ dashBpContent NO ENCONTRADO. Verificar HTML.');
                // Crear el elemento si no existe para debugging
                const mainContent = document.querySelector('.main-content');
                if (mainContent) {
                    const dummy = document.createElement('div');
                    dummy.id = 'dashBpContent';
                    mainContent.appendChild(dummy);
                    console.log('⚠️ Creado dashBpContent dinámicamente');
                }
                return;
            }

            console.log('✓ dashBpContent encontrado');

            // Estado inicial de carga
            if (!state.bps || !state.proyectos) {
                const loadingHtml = '<div class="card"><p class="text-center text-muted">⏳ Cargando datos de Firestore...</p></div>';
                content.innerHTML = loadingHtml;
                console.log('Estado de carga mostrado');
                return;
            }

            let html = '';

            // BPs
            if (state.bps.length > 0) {
                html += '<div class="card">';
                html += '<h2 style="color: #5b95ff; margin-bottom: 16px;">Brand Partners (' + state.bps.length + ')</h2>';
                html += '<ul style="color: #a8b1c7; list-style-position: inside;">';
                for (const bp of state.bps) {
                    html += '<li style="margin-bottom: 8px;">' + bp.nombre + ' <span style="color: #5b95ff;">(' + bp.seniority + ')</span></li>';
                }
                html += '</ul></div>';
            } else {
                html += '<div class="card"><p class="text-center text-muted">No hay Brand Partners</p></div>';
            }

            // Proyectos
            if (state.proyectos.length > 0) {
                html += '<div class="card">';
                html += '<h2 style="color: #5b95ff; margin-bottom: 16px;">Proyectos (' + state.proyectos.length + ')</h2>';
                html += '<ul style="color: #a8b1c7; list-style-position: inside;">';
                for (const proy of state.proyectos) {
                    html += '<li style="margin-bottom: 8px;">' + proy.nombre + ' <span style="color: #fbbf24;">(' + proy.tipo + ')</span></li>';
                }
                html += '</ul></div>';
            } else {
                html += '<div class="card"><p class="text-center text-muted">No hay Proyectos</p></div>';
            }

            content.innerHTML = html;
            console.log('✓ Dashboard renderizado completamente');
        }

        // ── Tab Navigation ──
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const tabId = e.target.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                e.target.classList.add('active');
            });
        });

        // ── Nav Links ──
        document.querySelectorAll('[data-page]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                navigate(e.target.dataset.page);
            });
        });

        // ── Auth State ──
        function initApp() {
            window.auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    console.log('Usuario autenticado:', user.email);
                    showAppPage();
                } else {
                    currentUser = null;
                    showLoginPage();
                }
            });
        }

        // Inicializar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', initFirebase);
    </script>
</body>
</html>
